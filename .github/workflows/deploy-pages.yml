name: Deploy Recife History Connections to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'Data-Visualization/Recife-History-Connections/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: Data-Visualization/Recife-History-Connections
      - id: deployment
        uses: actions/deploy-pages@v4
