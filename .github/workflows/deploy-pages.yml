name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'projects.json'
      - 'assets/**'
      - 'projects/**'
      - 'docs/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare site structure
        run: |
          # Publish the whole repo (landing page at root + every project folder),
          # excluding version control and CI metadata.
          mkdir -p _site
          rsync -a --exclude='.git' --exclude='.github' --exclude='_site' \
                   --exclude='_archive' --exclude='data-source' --exclude='.claude' ./ _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
