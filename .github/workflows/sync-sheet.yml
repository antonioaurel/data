name: Sync from Google Sheet

# The Google Sheet (nodes/edges/aliases) is the editing surface. This workflow keeps the
# repo (the deploy source of truth) in sync with it:
#   - manual "Run workflow" (workflow_dispatch) -> pull + build + commit  ("Sync" button)
#   - daily schedule                            -> drift check only (fails if repo is stale)

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * *'  # 06:17 UTC daily

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Sync (pull sheet, build, commit if changed)
        if: github.event_name == 'workflow_dispatch'
        working-directory: projects/recife-history-connections
        run: |
          python3 pull_sheet.py
          python3 build.py
          git config user.name  "sheet-sync[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/nodes.csv data/edges.csv data/aliases.csv \
                  data/graph.json data/content.json
          if git diff --cached --quiet; then
            echo "No changes - repo already matches the sheet."
          else
            git commit -m "data: sync from Google Sheet"
            git push
          fi

      - name: Drift check (scheduled - fails if the sheet is ahead of the repo)
        if: github.event_name == 'schedule'
        working-directory: projects/recife-history-connections
        run: |
          python3 pull_sheet.py --check
          python3 build.py --check
