name: Validate data & derived files

on:
  push:
    branches: [main]
    paths:
      - 'projects/recife-history-connections/data/nodes.csv'
      - 'projects/recife-history-connections/data/edges.csv'
      - 'projects/recife-history-connections/data/aliases.csv'
      - 'projects/recife-history-connections/data/graph.json'
      - 'projects/recife-history-connections/data/content.json'
      - 'projects/recife-history-connections/build.py'
      - 'projects/recife-history-connections/mobile/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'projects/recife-history-connections/data/nodes.csv'
      - 'projects/recife-history-connections/data/edges.csv'
      - 'projects/recife-history-connections/data/aliases.csv'
      - 'projects/recife-history-connections/data/graph.json'
      - 'projects/recife-history-connections/data/content.json'
      - 'projects/recife-history-connections/build.py'
      - 'projects/recife-history-connections/mobile/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate base & check desktop derived files are in sync
        working-directory: projects/recife-history-connections
        run: python3 build.py --check

      - name: Rebuild mobile artifacts
        working-directory: projects/recife-history-connections
        run: python3 mobile/build/build.py

      - name: Verify generated files are committed
        run: git diff --exit-code -- projects/recife-history-connections
