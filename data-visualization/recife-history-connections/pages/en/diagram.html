<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagram · Connections of Recife's History</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Raleway', sans-serif;
      background: #0f1923;
      color: #f0e6d3;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      background: #131d28;
      border-bottom: 1px solid #1e2d3d;
      padding: 0.65rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      z-index: 10;
    }

    .back-link {
      color: #6a7a8a;
      text-decoration: none;
      font-size: 0.8rem;
      white-space: nowrap;
      transition: color 0.15s;
    }
    .back-link:hover { color: #e8a838; }

    .sources-link { margin-left: auto; color: #6a7a8a; text-decoration: none; font-size: 0.8rem; white-space: nowrap; transition: color 0.15s; }
    .sources-link:hover { color: #e8a838; }

    .header-title {
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .header-title span { color: #e8a838; }

    .legend {
      display: flex;
      gap: 0.9rem;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.7rem;
      color: #6a7a8a;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Main layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Left: graph canvas ── */
    #left {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-width: 0;
      background: #0f1923;
    }

    #left svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* search box over the canvas */
    #diagram-search { position: absolute; top: 12px; left: 12px; z-index: 6; }
    .ds-input {
      width: 220px;
      background: rgba(15, 25, 35, 0.92);
      border: 1px solid #2a3d52;
      border-radius: 6px;
      color: #f0e6d3;
      font-family: 'Raleway', sans-serif;
      font-size: 0.82rem;
      padding: 0.45rem 0.7rem;
      outline: none;
      transition: border-color .15s;
    }
    .ds-input::placeholder { color: #4a6070; }
    .ds-input:focus { border-color: #e8a838; }

    /* navigation hint */
    #diagram-hint {
      position: absolute; bottom: 12px; left: 12px; z-index: 6;
      max-width: 360px;
      background: rgba(15, 25, 35, 0.9);
      border: 1px solid #2a3d52;
      border-radius: 8px;
      padding: 0.55rem 1.9rem 0.6rem 0.8rem;
      color: #9fb3c0;
      font-size: 0.72rem;
      line-height: 1.55;
    }
    #diagram-hint strong {
      display: block; color: #e8a838;
      font-size: 0.7rem; letter-spacing: 0.04em;
      text-transform: uppercase; margin-bottom: 0.2rem;
    }
    #hint-close {
      position: absolute; top: 3px; right: 7px;
      background: none; border: none; color: #6a7a8a;
      font-size: 1.05rem; cursor: pointer; line-height: 1;
    }
    #hint-close:hover { color: #e8a838; }

    /* labels shown on selected node + its neighbors */
    .labels text {
      display: none;
      font-family: 'Raleway', sans-serif;
      font-size: 9px;
      fill: #dce6ec;
      paint-order: stroke;
      stroke: rgba(10, 16, 22, 0.9);
      stroke-width: 3px;
      pointer-events: none;
      user-select: none;
    }
    .labels text.label-visible  { display: block; }
    .labels text.label-selected { fill: #e8a838; font-weight: 600; font-size: 10.5px; }

    .links line {
      stroke: rgba(150, 130, 110, 0.15);
      stroke-width: 1px;
    }

    .nodes circle {
      cursor: pointer;
      stroke-width: 1.5px;
      transition: stroke-width 0.1s;
    }

    .nodes circle:hover {
      stroke-width: 3px;
    }

    .nodes circle.selected {
      stroke: #e8a838 !important;
      stroke-width: 3px !important;
    }

    /* neighbor highlighting on selection */
    .nodes circle.faded { opacity: 0.12; }
    .links line.faded   { stroke-opacity: 0.04; }
    .nodes circle.neighbor {
      stroke: #e8a838;
      stroke-width: 2.5px;
    }
    .links line.highlight {
      stroke: rgba(232, 168, 56, 0.85);
      stroke-width: 2px;
    }

    /* Tooltip */
    #tooltip {
      position: absolute;
      background: rgba(15, 25, 35, 0.95);
      border: 1px solid #1e2d3d;
      color: #d0c0b0;
      font-family: 'Raleway', sans-serif;
      font-size: 0.75rem;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      pointer-events: none;
      white-space: nowrap;
      display: none;
      z-index: 20;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    /* ── Right: detail panel ── */
    #right {
      width: 300px;
      flex-shrink: 0;
      background: #111b27;
      border-left: 1px solid #1e2d3d;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Placeholder state */
    .panel-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
      color: #2a3a4a;
      gap: 1rem;
    }

    .panel-placeholder .ph-icon {
      width: 44px;
      height: 44px;
      border: 1.5px solid #1e2d3d;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .panel-placeholder p {
      font-size: 0.78rem;
      line-height: 1.65;
      color: #3a4a5a;
    }

    /* Detail panel content */
    #panel-content {
      display: none;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .detail-image-wrap {
      width: 100%;
      height: 155px;
      overflow: hidden;
      background: #0a131d;
      flex-shrink: 0;
      position: relative;
    }

    .detail-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .detail-image-wrap .no-img {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1e2d3d;
      font-size: 0.72rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .detail-body {
      padding: 0.85rem 1rem 0.9rem;
      border-bottom: 1px solid #1a2535;
      flex-shrink: 0;
    }

    .detail-type-badge {
      display: inline-block;
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 0.18rem 0.5rem;
      border-radius: 3px;
      margin-bottom: 0.45rem;
      font-weight: 600;
    }

    .detail-name {
      font-size: 1rem;
      font-weight: 600;
      color: #f0e6d3;
      line-height: 1.3;
      margin-bottom: 0.65rem;
    }

    .detail-desc {
      font-size: 0.76rem;
      line-height: 1.75;
      color: #7a8a9a;
    }

    /* Connections list */
    .connections-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 0.9rem 1rem;
    }

    .connections-wrap::-webkit-scrollbar { width: 4px; }
    .connections-wrap::-webkit-scrollbar-track { background: transparent; }
    .connections-wrap::-webkit-scrollbar-thumb { background: #1e2d3d; border-radius: 2px; }

    .conn-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #2a3a4a;
      margin-bottom: 0.55rem;
      padding-bottom: 0.45rem;
      border-bottom: 1px solid #1a2535;
    }

    .conn-card {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.4rem 0.45rem;
      border-radius: 5px;
      cursor: pointer;
      margin-bottom: 0.25rem;
      border: 1px solid transparent;
      transition: background 0.12s, border-color 0.12s;
    }

    .conn-card:hover {
      background: rgba(232,168,56,0.07);
      border-color: rgba(232,168,56,0.2);
    }

    .conn-thumb {
      width: 34px;
      height: 34px;
      border-radius: 4px;
      object-fit: cover;
      background: #0a131d;
      flex-shrink: 0;
    }

    .conn-name {
      font-size: 0.76rem;
      color: #9aaabb;
      line-height: 1.3;
    }

    .conn-empty {
      font-size: 0.75rem;
      color: #2a3a4a;
      font-style: italic;
    }
  </style>
</head>
<body>

<header>
  <a class="back-link" href="index.html">← Home</a>
  <div class="header-title">Connections <span>of History</span></div>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#4a90d9"></div> Location
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#e8833a"></div> Historical Figure
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#5cb85c"></div> Historical Event
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#9b59b6"></div> Other
    </div>
  </div>
  <a class="sources-link" href="sources.html">Sources</a>
</header>

<div class="main">
  <div id="left">
    <div id="diagram-search">
      <input id="node-search" class="ds-input" type="text" placeholder="Search node…" autocomplete="off" list="node-list">
      <datalist id="node-list"></datalist>
    </div>
    <div id="diagram-hint">
      <strong>How to navigate</strong>
      <span>🖱️ Drag to move &nbsp;·&nbsp; 🔍 Scroll to zoom &nbsp;·&nbsp; Click a node to highlight its connections</span>
      <button id="hint-close" title="Close">×</button>
    </div>
    <div id="tooltip"></div>
  </div>
  <div id="right">
    <div class="panel-placeholder" id="panel-placeholder">
      <div class="ph-icon">◎</div>
      <p>Click a node in the diagram to see its details and historical connections.</p>
    </div>
    <div id="panel-content"></div>
  </div>
</div>

<script src="https://d3js.org/d3.v4.min.js"></script>
<script>

var TYPE_COLOR = {
  'Local':           '#4a90d9',
  'Personagem':      '#e8833a',
  'Fato Histórico':  '#5cb85c',
};

function typeColor(tipo) {
  return TYPE_COLOR[tipo] || '#9b59b6';
}

function typeBadgeStyle(tipo) {
  var c = typeColor(tipo);
  return 'background:' + c + '22;color:' + c + ';border:1px solid ' + c + '55;';
}

var leftEl  = document.getElementById('left');
var tooltip = document.getElementById('tooltip');

var width  = leftEl.clientWidth;
var height = leftEl.clientHeight;

var svg = d3.select('#left')
  .append('svg')
  .attr('width', width)
  .attr('height', height);

var g = svg.append('g');

svg.call(
  d3.zoom()
    .scaleExtent([0.05, 10])
    .on('zoom', function() { g.attr('transform', d3.event.transform); })
);

// click on empty canvas clears selection + highlight
svg.on('click', function() {
  d3.selectAll('.nodes circle').classed('selected', false);
  clearHighlight();
});

var linksArray = [];
var nodesArray = [];

d3.csv('../../data/lista-geral-do-mapeamento.csv', function(error, graph) {
  if (error) throw error;
  nodesArray = graph;

  var connCount = {};
  graph.forEach(function(row) {
    connCount[row.Nome] = 0;
  });

  var nodeNameSet = {};
  graph.forEach(function(row) { nodeNameSet[row.Nome] = true; });

  graph.forEach(function(row) {
    for (var i = 1; i <= 15; i++) {
      var target = row['Interconexão ' + i];
      if (target && target.trim() && nodeNameSet[target.trim()]) {
        var key = [row.Nome, target.trim()].sort().join('||');
        linksArray.push({ source: row.Nome, target: target.trim() });
        connCount[row.Nome] = (connCount[row.Nome] || 0) + 1;
        connCount[target.trim()] = (connCount[target.trim()] || 0) + 1;
      }
    }
  });

  var link = g.append('g').attr('class', 'links')
    .selectAll('line')
    .data(linksArray)
    .enter().append('line');

  var node = g.append('g').attr('class', 'nodes')
    .selectAll('circle')
    .data(graph)
    .enter().append('circle')
    .attr('r', function(d) {
      var c = connCount[d.Nome] || 0;
      return Math.max(4, Math.min(20, 4 + c * 0.6));
    })
    .attr('fill', function(d) { return typeColor(d.Tipo); })
    .attr('stroke', function(d) { return typeColor(d.Tipo); })
    .on('mouseover', function(d) {
      tooltip.style.display = 'block';
      tooltip.textContent = d.Nome;
    })
    .on('mousemove', function() {
      tooltip.style.left = (d3.event.pageX + 12) + 'px';
      tooltip.style.top  = (d3.event.pageY - 28) + 'px';
    })
    .on('mouseout', function() { tooltip.style.display = 'none'; })
    .on('click', function(d) {
      d3.event.stopPropagation();
      d3.selectAll('.nodes circle').classed('selected', false);
      d3.select(this).classed('selected', true);
      highlightNeighbors(d.Nome);
      showDetail(d);
    })
    .call(d3.drag()
      .on('start', function(d) {
        if (!d3.event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on('drag', function(d) { d.fx = d3.event.x; d.fy = d3.event.y; })
      .on('end', function(d) {
        if (!d3.event.active) simulation.alphaTarget(0);
        d.fx = null; d.fy = null;
      })
    );

  var label = g.append('g').attr('class', 'labels')
    .selectAll('text')
    .data(graph)
    .enter().append('text')
      .attr('text-anchor', 'middle')
      .attr('dy', function(d) {
        var c = connCount[d.Nome] || 0;
        return -(Math.max(4, Math.min(20, 4 + c * 0.6)) + 5);
      })
      .text(function(d) { return d.Nome; });

  // populate search autocomplete
  var dl = document.getElementById('node-list');
  if (dl) {
    dl.innerHTML = graph.map(function(d) {
      return '<option value="' + d.Nome.replace(/"/g, '&quot;') + '">';
    }).join('');
  }

  var simulation = d3.forceSimulation(graph)
    .force('link', d3.forceLink(linksArray).id(function(d) { return d.Nome; }).distance(60))
    .force('charge', d3.forceManyBody().strength(-120))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .on('tick', function() {
      link
        .attr('x1', function(d) { return d.source.x; })
        .attr('y1', function(d) { return d.source.y; })
        .attr('x2', function(d) { return d.target.x; })
        .attr('y2', function(d) { return d.target.y; });
      node
        .attr('cx', function(d) { return d.x; })
        .attr('cy', function(d) { return d.y; });
      label
        .attr('x', function(d) { return d.x; })
        .attr('y', function(d) { return d.y; });
    });
});

function highlightNeighbors(nome) {
  var keep = {};
  keep[nome] = true;
  getConnections(nome).forEach(function(t) { keep[t.Nome || t] = true; });

  d3.selectAll('.nodes circle')
    .classed('faded', function(d) { return !keep[d.Nome]; })
    .classed('neighbor', function(d) { return keep[d.Nome] && d.Nome !== nome; });

  d3.selectAll('.links line')
    .classed('highlight', function(l) {
      var s = l.source.Nome || l.source, t = l.target.Nome || l.target;
      return s === nome || t === nome;
    })
    .classed('faded', function(l) {
      var s = l.source.Nome || l.source, t = l.target.Nome || l.target;
      return !(s === nome || t === nome);
    });

  d3.selectAll('.labels text')
    .classed('label-visible',  function(d) { return keep[d.Nome]; })
    .classed('label-selected', function(d) { return d.Nome === nome; });
}

function clearHighlight() {
  d3.selectAll('.nodes circle').classed('faded', false).classed('neighbor', false);
  d3.selectAll('.links line').classed('faded', false).classed('highlight', false);
  d3.selectAll('.labels text').classed('label-visible', false).classed('label-selected', false);
}

/* ── Search + navigation hint ─────────────────────────────────────────────── */
document.getElementById('node-search').addEventListener('input', function() {
  var q = this.value.trim().toLowerCase();
  if (!q || !nodesArray.length) return;
  var exact = nodesArray.find(function(n) { return n.Nome.toLowerCase() === q; });
  var m = exact || nodesArray.find(function(n) { return n.Nome.toLowerCase().indexOf(q) !== -1; });
  if (m) selectByName(m.Nome);
});

(function() {
  var btn = document.getElementById('hint-close');
  if (btn) btn.addEventListener('click', function() {
    document.getElementById('diagram-hint').style.display = 'none';
  });
})();

function getConnections(nome) {
  return nodesArray.filter(function(n) {
    return linksArray.some(function(l) {
      return (l.source.Nome === nome && l.target.Nome === n.Nome) ||
             (l.target.Nome === nome && l.source.Nome === n.Nome);
    });
  });
}

function getNode(nome) {
  return nodesArray.find(function(n) { return n.Nome === nome; });
}

function showDetail(d) {
  document.getElementById('panel-placeholder').style.display = 'none';

  var imgSrc  = d.Imagem || '';
  var imgHtml = imgSrc
    ? '<img src="' + imgSrc + '" onerror="this.parentNode.innerHTML=\'<div class=no-img>Image unavailable</div>\'">'
    : '<div class="no-img">No image</div>';

  var conns      = getConnections(d.Nome);
  var connCards  = '';
  if (conns.length === 0) {
    connCards = '<div class="conn-empty">No connections registered.</div>';
  } else {
    conns.forEach(function(target) {
      var tName = target.Nome || target;
      var tImg  = target.Imagem || '';
      var thumb = tImg
        ? '<img class="conn-thumb" src="' + tImg + '" onerror="this.style.display=\'none\'">'
        : '<div class="conn-thumb" style="display:flex;align-items:center;justify-content:center;color:#1e2d3d;font-size:0.6rem">—</div>';
      connCards += '<div class="conn-card" onclick="selectByName(\'' + tName.replace(/'/g, "\\'") + '\')">'
        + thumb
        + '<span class="conn-name">' + tName + '</span>'
        + '</div>';
    });
  }

  var tipo  = d.Tipo || 'Other';
  var desc  = d['Descrição'] || '';
  var local = d.Local ? '<div style="font-size:0.7rem;color:#4a6a7a;margin-bottom:0.4rem;">📍 ' + d.Local + '</div>' : '';

  var panel = document.getElementById('panel-content');
  panel.innerHTML =
    '<div class="detail-image-wrap">' + imgHtml + '</div>' +
    '<div class="detail-body">' +
      '<div class="detail-type-badge" style="' + typeBadgeStyle(tipo) + '">' + tipo + '</div>' +
      '<div class="detail-name">' + d.Nome + '</div>' +
      local +
      '<div class="detail-desc">' + (desc || '<em style="color:#3a4a5a">No description available.</em>') + '</div>' +
    '</div>' +
    '<div class="connections-wrap">' +
      '<div class="conn-label">Connections (' + conns.length + ')</div>' +
      connCards +
    '</div>';

  panel.style.display = 'flex';
}

function selectByName(nome) {
  var node = getNode(nome);
  if (!node) return;
  d3.selectAll('.nodes circle').classed('selected', false);
  d3.selectAll('.nodes circle')
    .filter(function(d) { return d.Nome === nome; })
    .classed('selected', true);
  highlightNeighbors(nome);
  showDetail(node);
}

</script>
</body>
</html>
