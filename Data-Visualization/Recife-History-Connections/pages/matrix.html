<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix · Conexões da Historia do Recife</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cell-size:  12px;
      --label-size: 168px;
      --label-font: 10px;
      --panel-w:    290px;
    }

    body {
      font-family: 'Raleway', sans-serif;
      background: #0f1923;
      color: #f0e6d3;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      background: #131d28;
      border-bottom: 1px solid #1e2d3d;
      padding: 0.65rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .back-link { color: #c0b0a0; text-decoration: none; font-size: 0.8rem; transition: color .15s; }
    .back-link:hover { color: #e8a838; }
    .sources-link { margin-left: auto; color: #6a7a8a; text-decoration: none; font-size: 0.8rem; white-space: nowrap; transition: color .15s; }
    .sources-link:hover { color: #e8a838; }
    .header-title { font-size: 0.95rem; font-weight: 600; color: #f0e6d3; }
    .header-title span { color: #e8a838; }

    /* ── Toolbar ── */
    .toolbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.6rem;
      padding: 0.5rem 1.25rem;
      background: #111b27;
      border-bottom: 1px solid #1a2535;
    }

    .tb-input {
      background: #0f1923;
      border: 1px solid #2a3d52;
      border-radius: 6px;
      color: #f0e6d3;
      font-family: 'Raleway', sans-serif;
      font-size: 0.8rem;
      padding: 0.35rem 0.7rem;
      outline: none;
      transition: border-color .15s;
    }
    .tb-input::placeholder { color: #4a6070; }
    .tb-input:focus { border-color: #e8a838; }
    #search    { width: 190px; }
    #filter-in { width: 180px; }

    .tb-clear {
      background: none;
      border: 1px solid #2a3d52;
      border-radius: 5px;
      color: #a09080;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.35rem 0.55rem;
      transition: color .12s, border-color .12s;
      line-height: 1;
    }
    .tb-clear:hover { color: #e8a838; border-color: #e8a838; }
    .tb-clear.hidden { display: none; }

    .tb-label { font-size: 0.68rem; color: #5a7080; white-space: nowrap; }
    .tb-sep   { width: 1px; height: 22px; background: #1e2d3d; flex-shrink: 0; }

    .toolbar-stats { font-size: 0.72rem; color: #a09080; white-space: nowrap; }
    .toolbar-stats strong { color: #c0b0a0; }

    .zoom-group { display: flex; align-items: center; gap: 0.35rem; margin-left: auto; }
    .zoom-label { font-size: 0.7rem; color: #a09080; white-space: nowrap; }
    .zoom-btn {
      background: #1a2d3d; border: 1px solid #2a3d52; color: #c0b0a0;
      font-size: 1rem; width: 26px; height: 26px; border-radius: 5px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .12s, color .12s; user-select: none;
    }
    .zoom-btn:hover { background: #243d52; color: #e8a838; }
    #zoom-level { font-size: 0.72rem; color: #c0b0a0; min-width: 36px; text-align: center; }

    /* ── Workspace ── */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
      position: relative;
    }

    /* ── Canvas scroll area ── */
    .canvas-area {
      flex: 1;
      overflow: auto;
      min-width: 0;
      background: #0d1720;
    }
    .canvas-area::-webkit-scrollbar { width: 7px; height: 7px; }
    .canvas-area::-webkit-scrollbar-track { background: #0a1018; }
    .canvas-area::-webkit-scrollbar-thumb { background: #2a3d52; border-radius: 4px; }

    /* ── Frozen-pane layout ── */
    .matrix-outer {
      display: flex;
      flex-direction: column;
      width: fit-content;
      min-width: max-content;
    }

    /* Header row: sticky top */
    .header-row {
      display: flex;
      position: sticky;
      top: 0;
      z-index: 3;
    }

    /* Corner: sticky top-left */
    .corner {
      flex-shrink: 0;
      width:  var(--label-size);
      height: var(--label-size);
      position: sticky;
      left: 0;
      z-index: 4;
      background: #0d1720;
      border-right:  1px solid #1e2d3d;
      border-bottom: 1px solid #1e2d3d;
    }

    /* Column labels */
    #col-labels {
      display: flex;
      align-items: flex-end;
      height: var(--label-size);
      background: #0d1720;
      border-bottom: 1px solid #1e2d3d;
    }
    .col-label {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      font-size: var(--label-font);
      color: #c0b0a0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-height: calc(var(--label-size) - 4px);
      line-height: 1.1;
      cursor: pointer;
      transition: color .1s, opacity .2s;
      width: var(--cell-size);
    }
    .col-label:hover       { color: #e8a838; }
    .col-label.highlighted { color: #e8a838; font-weight: 700; }
    .col-label.dimmed      { opacity: 0.2; }

    /* Body row */
    .body-row { display: flex; }

    /* Row labels: sticky left */
    #row-labels {
      flex-shrink: 0;
      width: var(--label-size);
      display: flex;
      flex-direction: column;
      position: sticky;
      left: 0;
      z-index: 2;
      background: #0d1720;
      border-right: 1px solid #1e2d3d;
    }
    .row-label {
      font-size: var(--label-font);
      color: #c0b0a0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: calc(var(--label-size) - 6px);
      line-height: 1.1;
      text-align: right;
      padding-right: 5px;
      cursor: pointer;
      transition: color .1s, opacity .2s;
      height: var(--cell-size);
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    .row-label:hover       { color: #e8a838; }
    .row-label.highlighted { color: #e8a838; font-weight: 700; }
    .row-label.dimmed      { opacity: 0.2; }

    canvas#matrix {
      display: block;
      cursor: crosshair;
      image-rendering: pixelated;
    }

    /* ── Minimap ── */
    .minimap-wrap {
      position: fixed;
      z-index: 50;
      background: rgba(8, 14, 20, 0.95);
      border: 1px solid #2a3d52;
      border-radius: 6px;
      padding: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
      cursor: crosshair;
    }
    .minimap-title {
      font-size: 0.6rem;
      color: #5a7080;
      text-align: center;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    #minimap {
      display: block;
      width:  160px;
      height: 160px;
      image-rendering: pixelated;
      border-radius: 2px;
    }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      background: rgba(8,14,20,0.97);
      border: 1px solid #2a3d52;
      border-radius: 5px;
      padding: 0.45rem 0.75rem;
      font-size: 0.72rem;
      color: #c0b0a0;
      pointer-events: none;
      display: none;
      z-index: 100;
      max-width: 280px;
      line-height: 1.6;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    #tooltip .tt-row  { color: #e0c898; }
    #tooltip .tt-col  { color: #a0c0a8; }
    #tooltip .tt-conn { color: #e8a838; font-weight: 600; }
    #tooltip .tt-none { color: #4a5a6a; }

    /* ── Right panel ── */
    #panel {
      width: var(--panel-w);
      flex-shrink: 0;
      background: #111b27;
      border-left: 1px solid #1a2535;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-placeholder {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1.5rem; text-align: center; gap: .75rem;
    }
    .panel-placeholder p { font-size: 0.78rem; line-height: 1.7; color: #7a8a90; }

    #panel-content { display: none; flex-direction: column; height: 100%; overflow: hidden; }

    .pd-header { padding: .85rem 1rem; border-bottom: 1px solid #1a2535; flex-shrink: 0; }
    .pd-type { font-size: .6rem; text-transform: uppercase; letter-spacing: 2px; color: #e8a838; margin-bottom: .35rem; }
    .pd-name { font-size: 1rem; font-weight: 600; color: #f0e6d3; line-height: 1.3; }
    .pd-local { font-size: .7rem; color: #a09080; margin-top: .25rem; }

    .pd-desc {
      padding: .75rem 1rem;
      font-size: .76rem; line-height: 1.7; color: #c0b0a0;
      border-bottom: 1px solid #1a2535;
      flex-shrink: 0; max-height: 120px; overflow-y: auto;
    }

    .pd-conn-list { flex: 1; overflow-y: auto; padding: .6rem .9rem 1rem; }
    .pd-conn-list::-webkit-scrollbar { width: 3px; }
    .pd-conn-list::-webkit-scrollbar-thumb { background: #2a3d52; }

    .pd-conn-total {
      font-size: .6rem; text-transform: uppercase; letter-spacing: 2px;
      color: #5a6a70; margin-bottom: .6rem; padding-bottom: .4rem;
      border-bottom: 1px solid #1a2535;
    }

    /* Connection groups */
    .conn-group { margin-bottom: .85rem; }

    .conn-group-header {
      display: flex;
      align-items: center;
      gap: .4rem;
      padding: .3rem .4rem .3rem .6rem;
      border-left: 2px solid #2a3d52;
      margin-bottom: .3rem;
    }
    .cg-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .cg-name { font-size: .72rem; color: #c0b0a0; font-weight: 600; }
    .cg-latin { font-size: .6rem; color: #5a6a70; font-style: italic; margin-left: .2rem; }
    .cg-count { font-size: .64rem; color: #5a6a70; margin-left: auto; }

    .conn-item {
      font-size: .75rem; color: #c0b0a0;
      padding: .28rem .4rem .28rem .8rem;
      border-radius: 4px; cursor: pointer;
      border: 1px solid transparent;
      transition: background .1s, border-color .1s, color .1s;
    }
    .conn-item:hover {
      background: rgba(232,168,56,.07);
      border-color: rgba(232,168,56,.25);
      color: #e8a838;
    }
  </style>
</head>
<body>

<header>
  <a class="back-link" href="index.html">← Início</a>
  <div class="header-title">Matrix · <span>Conexões da Historia do Recife</span></div>
  <a class="sources-link" href="sources.html">Fontes</a>
</header>

<div class="toolbar">
  <span class="tb-label">Buscar</span>
  <input id="search"    class="tb-input" type="text" placeholder="Nome do nó…"     autocomplete="off">

  <div class="tb-sep"></div>

  <span class="tb-label">Filtrar</span>
  <input id="filter-in" class="tb-input" type="text" placeholder="Nós a destacar…" autocomplete="off">
  <button id="filter-clear" class="tb-clear hidden" title="Limpar filtro">✕</button>

  <div class="tb-sep"></div>
  <div class="toolbar-stats" id="stats">Carregando…</div>

  <div class="zoom-group">
    <span class="zoom-label">Zoom</span>
    <button class="zoom-btn" id="zoom-out">−</button>
    <div id="zoom-level">12px</div>
    <button class="zoom-btn" id="zoom-in">+</button>
  </div>
</div>

<div class="workspace">

  <!-- Main scrollable matrix with frozen panes -->
  <div class="canvas-area" id="canvas-area">
    <div class="matrix-outer">

      <div class="header-row">
        <div class="corner"></div>
        <div id="col-labels"></div>
      </div>

      <div class="body-row">
        <div id="row-labels"></div>
        <canvas id="matrix"></canvas>
      </div>

    </div>
  </div>

  <!-- Minimap (always visible, top-right of canvas area) -->
  <div class="minimap-wrap" id="minimap-wrap">
    <div class="minimap-title">Visão Geral</div>
    <canvas id="minimap"></canvas>
  </div>

  <!-- Detail panel -->
  <div id="panel">
    <div class="panel-placeholder" id="panel-placeholder">
      <p>Clique em qualquer <strong style="color:#c0b0a0">linha ou célula</strong> da matrix para ver os detalhes e as conexões agrupadas por:</p>
      <div style="display:flex;flex-direction:column;gap:.4rem;margin-top:.5rem;text-align:left;width:100%">
        <div style="display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:#7a8a90">
          <div style="width:8px;height:8px;border-radius:50%;background:#4a90d9;flex-shrink:0"></div>
          Local — <em style="color:#4a6070">Loca Historica</em>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:#7a8a90">
          <div style="width:8px;height:8px;border-radius:50%;background:#e8833a;flex-shrink:0"></div>
          Personagem — <em style="color:#4a6070">Personae Illustres</em>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:#7a8a90">
          <div style="width:8px;height:8px;border-radius:50%;background:#5cb85c;flex-shrink:0"></div>
          Fato Histórico — <em style="color:#4a6070">Res Gestae</em>
        </div>
      </div>
    </div>
    <div id="panel-content"></div>
  </div>

</div>

<div id="tooltip"></div>

<script src="https://d3js.org/d3.v4.min.js"></script>
<script>

/* ── Constants ────────────────────────────────────────────────────────────── */
var CELL     = 12;
var MIN_CELL = 2;
var MAX_CELL = 28;

var TIPO_META = {
  'Local':           { label: 'Local',           latin: 'Loca Historica',     color: '#4a90d9' },
  'Personagem':      { label: 'Personagem',       latin: 'Personae Illustres', color: '#e8833a' },
  'Fato Histórico':  { label: 'Fato Histórico',   latin: 'Res Gestae',         color: '#5cb85c' },
};
function tipoMeta(tipo) {
  return TIPO_META[tipo] || { label: tipo || 'Outro', latin: 'Alia', color: '#9b59b6' };
}

/* ── State ────────────────────────────────────────────────────────────────── */
var names = [], nodeData = {}, adjMatrix, N;
var selectedRow = -1;
var filterIndices = null; // null = no filter, Set = active filter

/* ── DOM refs ─────────────────────────────────────────────────────────────── */
var canvas      = document.getElementById('matrix');
var ctx         = canvas.getContext('2d');
var minimapEl   = document.getElementById('minimap');
var minimapCtx  = minimapEl.getContext('2d');
var tooltip     = document.getElementById('tooltip');
var canvasArea  = document.getElementById('canvas-area');

/* ── Minimap position (fixed, above the panel) ────────────────────────────── */
function positionMinimap() {
  var headerH  = document.querySelector('header').offsetHeight;
  var toolbarH = document.querySelector('.toolbar').offsetHeight;
  var wrap = document.getElementById('minimap-wrap');
  wrap.style.top   = (headerH + toolbarH + 10) + 'px';
  wrap.style.right = (parseInt(getComputedStyle(document.documentElement)
                        .getPropertyValue('--panel-w')) + 12) + 'px';
}
window.addEventListener('load',   positionMinimap);
window.addEventListener('resize', positionMinimap);

/* ── Load CSV ─────────────────────────────────────────────────────────────── */
d3.csv('../data/lista-geral-do-mapeamento.csv', function(error, graph) {
  if (error) { console.error(error); return; }

  graph.sort(function(a, b) { return a.Nome.localeCompare(b.Nome, 'pt-BR'); });
  names = graph.map(function(r) { return r.Nome; });
  N = names.length;

  var nameIdx = {};
  names.forEach(function(n, i) { nameIdx[n] = i; nodeData[n] = graph[i]; });

  adjMatrix = new Uint8Array(N * N);
  graph.forEach(function(row) {
    var i = nameIdx[row.Nome];
    Object.keys(row).forEach(function(k) {
      if (k.startsWith('Intercon') && row[k].trim() !== '') {
        var j = nameIdx[row[k].trim()];
        if (j !== undefined) { adjMatrix[i * N + j] = 1; adjMatrix[j * N + i] = 1; }
      }
    });
  });

  var total = 0;
  for (var x = 0; x < adjMatrix.length; x++) { if (adjMatrix[x]) total++; }
  document.getElementById('stats').innerHTML =
    '<strong>' + N + '</strong> nós · <strong>' + (total / 2) + '</strong> conexões';

  // Setup minimap canvas (physical N×N → CSS 160×160)
  minimapEl.width  = N;
  minimapEl.height = N;

  buildLabels();
  applyZoom(CELL);
});

/* ── Build axis labels ────────────────────────────────────────────────────── */
function buildLabels() {
  var colWrap = document.getElementById('col-labels');
  var rowWrap = document.getElementById('row-labels');
  names.forEach(function(name, i) {
    var c = document.createElement('div');
    c.className = 'col-label'; c.id = 'cl-' + i;
    c.title = name; c.textContent = name;
    c.addEventListener('click', function() { selectNode(name); });
    colWrap.appendChild(c);

    var r = document.createElement('div');
    r.className = 'row-label'; r.id = 'rl-' + i;
    r.title = name; r.textContent = name;
    r.addEventListener('click', function() { selectNode(name); });
    rowWrap.appendChild(r);
  });
}

/* ── Zoom ─────────────────────────────────────────────────────────────────── */
function getLabelSize() {
  return parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--label-size')) || 70;
}

function computeLabelSize(fontPx) {
  var offscreen = document.createElement('canvas').getContext('2d');
  offscreen.font = fontPx + 'px Raleway, sans-serif';
  var maxW = 0;
  names.forEach(function(n) {
    var w = offscreen.measureText(n).width;
    if (w > maxW) maxW = w;
  });
  return Math.ceil(maxW) + 16;
}

/* Labels get sparse at small cell sizes so they don't overlap */
function updateLabelDensity() {
  var step = Math.max(1, Math.ceil(16 / CELL)); // show every Nth label
  names.forEach(function(_, i) {
    var show = (i % step === 0);
    var cl = document.getElementById('cl-' + i);
    var rl = document.getElementById('rl-' + i);
    if (cl) cl.style.color = show ? '' : 'transparent';
    if (rl) rl.style.color = show ? '' : 'transparent';
  });
}

function applyZoom(newCell) {
  CELL = Math.max(MIN_CELL, Math.min(MAX_CELL, newCell));
  // Font: minimum 10px so text is always legible
  var labelFont = Math.max(10, Math.min(15, CELL * 1.9));
  // Label area: always wide enough for the longest name at min 10px font,
  // and never below 220px so it doesn't collapse on zoom-out
  var labelSize = names.length
    ? Math.max(220, computeLabelSize(labelFont))
    : 220;

  var root = document.documentElement;
  root.style.setProperty('--cell-size',  CELL      + 'px');
  root.style.setProperty('--label-size', labelSize + 'px');
  root.style.setProperty('--label-font', labelFont + 'px');

  canvas.width  = N * CELL;
  canvas.height = N * CELL;

  document.getElementById('zoom-level').textContent = CELL + 'px';
  if (names.length) updateLabelDensity();
  redraw();
}

document.getElementById('zoom-in').addEventListener('click',  function() { applyZoom(CELL + (CELL < 8 ? 1 : 2)); });
document.getElementById('zoom-out').addEventListener('click', function() { applyZoom(CELL - (CELL <= 8 ? 1 : 2)); });
canvasArea.addEventListener('wheel', function(e) {
  if (e.ctrlKey || e.metaKey) { e.preventDefault(); applyZoom(e.deltaY < 0 ? CELL + 1 : CELL - 1); }
}, { passive: false });

/* ── Draw main matrix ─────────────────────────────────────────────────────── */
function drawMatrix(highlightIdx) {
  ctx.fillStyle = '#0d1720';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines at large zoom
  if (CELL >= 6) {
    ctx.strokeStyle = 'rgba(30,45,60,0.45)';
    ctx.lineWidth = 0.5;
    for (var g = 0; g <= N; g += 10) {
      ctx.beginPath();
      ctx.moveTo(g * CELL, 0); ctx.lineTo(g * CELL, canvas.height);
      ctx.moveTo(0, g * CELL); ctx.lineTo(canvas.width, g * CELL);
      ctx.stroke();
    }
  }

  // Highlight band
  if (highlightIdx !== undefined) {
    ctx.fillStyle = 'rgba(232,168,56,0.06)';
    ctx.fillRect(0, highlightIdx * CELL, canvas.width, CELL);
    ctx.fillRect(highlightIdx * CELL, 0, CELL, canvas.height);
  }

  var gap = CELL > 4 ? 1 : 0;

  for (var i = 0; i < N; i++) {
    for (var j = 0; j < N; j++) {
      if (!adjMatrix[i * N + j]) continue;

      var inFilter  = !filterIndices || filterIndices.has(i) || filterIndices.has(j);
      var isHighlight = highlightIdx !== undefined && (i === highlightIdx || j === highlightIdx);

      if (!inFilter) {
        ctx.fillStyle = 'rgba(232,168,56,0.07)';
      } else if (isHighlight) {
        ctx.fillStyle = '#f5c842';
      } else {
        ctx.fillStyle = '#e8a838';
      }
      ctx.fillRect(j * CELL, i * CELL, CELL - gap, CELL - gap);
    }
  }

  if (highlightIdx !== undefined) {
    ctx.fillStyle = 'rgba(245,200,66,0.5)';
    ctx.fillRect(highlightIdx * CELL, highlightIdx * CELL, CELL, CELL);
  }
}

/* ── Draw minimap ─────────────────────────────────────────────────────────── */
function drawMinimap(highlightIdx) {
  // Physical canvas is N×N (1px per node)
  minimapCtx.fillStyle = '#0d1720';
  minimapCtx.fillRect(0, 0, N, N);

  // Highlight band
  if (highlightIdx !== undefined) {
    minimapCtx.fillStyle = 'rgba(232,168,56,0.18)';
    minimapCtx.fillRect(0, highlightIdx, N, 1);
    minimapCtx.fillRect(highlightIdx, 0, 1, N);
  }

  // Connections
  for (var i = 0; i < N; i++) {
    for (var j = 0; j < N; j++) {
      if (!adjMatrix[i * N + j]) continue;
      var inFilter  = !filterIndices || filterIndices.has(i) || filterIndices.has(j);
      var isHi = highlightIdx !== undefined && (i === highlightIdx || j === highlightIdx);

      if (!inFilter) {
        minimapCtx.fillStyle = 'rgba(232,168,56,0.12)';
      } else if (isHi) {
        minimapCtx.fillStyle = '#f5c842';
      } else {
        minimapCtx.fillStyle = '#e8a838';
      }
      minimapCtx.fillRect(j, i, 1, 1);
    }
  }

  drawMinimapViewport();
}

function drawMinimapViewport() {
  var labelSize = getLabelSize();
  var startX = Math.max(0, canvasArea.scrollLeft  / CELL);
  var startY = Math.max(0, canvasArea.scrollTop   / CELL);
  var visW   = (canvasArea.clientWidth  - labelSize) / CELL;
  var visH   = (canvasArea.clientHeight - labelSize) / CELL;

  minimapCtx.strokeStyle = 'rgba(255,255,255,0.65)';
  minimapCtx.lineWidth = 1.5;
  minimapCtx.strokeRect(
    Math.max(0, startX),
    Math.max(0, startY),
    Math.min(visW, N - startX),
    Math.min(visH, N - startY)
  );
}

function redraw() {
  var hi = selectedRow >= 0 ? selectedRow : undefined;
  drawMatrix(hi);
  drawMinimap(hi);
}

/* ── Scroll → update minimap viewport ────────────────────────────────────── */
canvasArea.addEventListener('scroll', function() {
  if (!N) return;
  var hi = selectedRow >= 0 ? selectedRow : undefined;
  // Only redraw viewport rect on minimap (cheap)
  minimapCtx.clearRect(0, 0, N, N);
  drawMinimap(hi);
});

/* ── Minimap click → navigate ─────────────────────────────────────────────── */
document.getElementById('minimap-wrap').addEventListener('click', function(e) {
  if (!N) return;
  var rect   = minimapEl.getBoundingClientRect();
  var nodeX  = Math.round((e.clientX - rect.left)  / rect.width  * N);
  var nodeY  = Math.round((e.clientY - rect.top)   / rect.height * N);
  var labelSize = getLabelSize();
  canvasArea.scrollTo({
    left: Math.max(0, labelSize + nodeX * CELL - canvasArea.clientWidth  / 2),
    top:  Math.max(0, labelSize + nodeY * CELL - canvasArea.clientHeight / 2),
    behavior: 'smooth'
  });
});

/* ── Mouse events ─────────────────────────────────────────────────────────── */
canvas.addEventListener('mousemove', function(e) {
  var rect = canvas.getBoundingClientRect();
  var scaleX = canvas.width  / rect.width;
  var scaleY = canvas.height / rect.height;
  var col = Math.floor((e.clientX - rect.left) * scaleX / CELL);
  var row = Math.floor((e.clientY - rect.top)  * scaleY / CELL);
  if (col < 0 || col >= N || row < 0 || row >= N) { hideTooltip(); return; }

  var connected = adjMatrix[row * N + col] === 1;
  var same      = row === col;

  tooltip.style.display = 'block';
  tooltip.style.left = (e.clientX + 16) + 'px';
  tooltip.style.top  = (e.clientY - 10) + 'px';
  tooltip.innerHTML =
    '<div class="tt-row">↓ ' + names[row] + '</div>' +
    '<div class="tt-col">→ ' + names[col] + '</div>' +
    (same      ? '<div class="tt-none">—</div>'
   : connected ? '<div class="tt-conn">✓ Conectados</div>'
               : '<div class="tt-none">Sem conexão</div>');
});

canvas.addEventListener('mouseleave', hideTooltip);

canvas.addEventListener('click', function(e) {
  var rect   = canvas.getBoundingClientRect();
  var scaleY = canvas.height / rect.height;
  var row    = Math.floor((e.clientY - rect.top) * scaleY / CELL);
  if (row >= 0 && row < N) selectNode(names[row]);
});

function hideTooltip() { tooltip.style.display = 'none'; }

/* ── Label highlight ──────────────────────────────────────────────────────── */
function highlightLabel(idx) {
  document.querySelectorAll('.col-label.highlighted, .row-label.highlighted')
    .forEach(function(el) { el.classList.remove('highlighted'); });
  if (idx >= 0) {
    var cl = document.getElementById('cl-' + idx);
    var rl = document.getElementById('rl-' + idx);
    if (cl) cl.classList.add('highlighted');
    if (rl) rl.classList.add('highlighted');
  }
}

/* ── Filter ───────────────────────────────────────────────────────────────── */
document.getElementById('filter-in').addEventListener('input', function() {
  var q = this.value.trim().toLowerCase();
  var clearBtn = document.getElementById('filter-clear');

  if (!q) {
    filterIndices = null;
    clearBtn.classList.add('hidden');
    document.querySelectorAll('.col-label, .row-label').forEach(function(el) {
      el.classList.remove('dimmed');
    });
  } else {
    filterIndices = new Set();
    names.forEach(function(n, i) {
      if (n.toLowerCase().includes(q)) filterIndices.add(i);
    });
    clearBtn.classList.remove('hidden');
    // Dim non-matching labels
    names.forEach(function(n, i) {
      var inF = filterIndices.has(i);
      var cl = document.getElementById('cl-' + i);
      var rl = document.getElementById('rl-' + i);
      if (cl) cl.classList.toggle('dimmed', !inF);
      if (rl) rl.classList.toggle('dimmed', !inF);
    });
  }

  redraw();
});

document.getElementById('filter-clear').addEventListener('click', function() {
  document.getElementById('filter-in').value = '';
  document.getElementById('filter-in').dispatchEvent(new Event('input'));
});

/* ── Detail panel with grouped connections ────────────────────────────────── */
function showNodeDetail(name) {
  var d = nodeData[name];
  if (!d) return;

  document.getElementById('panel-placeholder').style.display = 'none';

  var idx   = names.indexOf(name);
  var conns = [];
  for (var j = 0; j < N; j++) { if (adjMatrix[idx * N + j]) conns.push(names[j]); }

  // Group by Tipo
  var groups = {};
  var ORDER  = ['Local', 'Personagem', 'Fato Histórico'];
  conns.forEach(function(cn) {
    var tipo = (nodeData[cn] && nodeData[cn].Tipo) ? nodeData[cn].Tipo : 'Outro';
    if (!groups[tipo]) groups[tipo] = [];
    groups[tipo].push(cn);
  });

  // Build group HTML
  var groupHtml = '';
  ORDER.concat(Object.keys(groups).filter(function(t) { return ORDER.indexOf(t) < 0; }))
    .forEach(function(tipo) {
      if (!groups[tipo] || groups[tipo].length === 0) return;
      var m = tipoMeta(tipo);
      groupHtml +=
        '<div class="conn-group">' +
          '<div class="conn-group-header" style="border-left-color:' + m.color + '">' +
            '<div class="cg-dot" style="background:' + m.color + '"></div>' +
            '<span class="cg-name">' + m.label + '</span>' +
            '<span class="cg-latin">' + m.latin + '</span>' +
            '<span class="cg-count">(' + groups[tipo].length + ')</span>' +
          '</div>';
      groups[tipo].forEach(function(cn) {
        groupHtml += '<div class="conn-item" onclick="selectNode(\'' + cn.replace(/'/g, "\\'") + '\')">' + cn + '</div>';
      });
      groupHtml += '</div>';
    });

  if (!groupHtml) {
    groupHtml = '<div style="font-size:.75rem;color:#4a5a60;font-style:italic">Sem conexões.</div>';
  }

  var pc = document.getElementById('panel-content');
  pc.innerHTML =
    '<div class="pd-header">' +
      (d.Tipo  ? '<div class="pd-type">' + d.Tipo + '</div>' : '') +
      '<div class="pd-name">' + name + '</div>' +
      (d.Local ? '<div class="pd-local">📍 ' + d.Local + '</div>' : '') +
    '</div>' +
    (d['Descrição'] ? '<div class="pd-desc">' + d['Descrição'] + '</div>' : '') +
    '<div class="pd-conn-list">' +
      '<div class="pd-conn-total">Conexões (' + conns.length + ')</div>' +
      groupHtml +
    '</div>';

  pc.style.display = 'flex';
}

/* ── Select node ──────────────────────────────────────────────────────────── */
function selectNode(name) {
  var idx = names.indexOf(name);
  if (idx < 0) return;
  selectedRow = idx;
  highlightLabel(idx);
  redraw();
  showNodeDetail(name);

  var labelSize = getLabelSize();
  canvasArea.scrollTo({
    top:  Math.max(0, labelSize + idx * CELL - canvasArea.clientHeight / 2),
    left: Math.max(0, labelSize + idx * CELL - canvasArea.clientWidth  / 2),
    behavior: 'smooth'
  });
}

/* ── Search ───────────────────────────────────────────────────────────────── */
document.getElementById('search').addEventListener('input', function() {
  var q = this.value.trim().toLowerCase();
  if (!q || !names.length) return;
  var match = names.find(function(n) { return n.toLowerCase().includes(q); });
  if (match) selectNode(match);
});

/* ── Keyboard navigation ──────────────────────────────────────────────────── */
document.addEventListener('keydown', function(e) {
  if (!N) return;
  // Don't capture when the user is typing in an input
  if (document.activeElement && document.activeElement.tagName === 'INPUT') return;

  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    var delta = e.key === 'ArrowDown' ? 1 : -1;
    var next  = selectedRow < 0
      ? 0
      : Math.max(0, Math.min(N - 1, selectedRow + delta));
    selectNode(names[next]);

  } else if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
    e.preventDefault();
    var scroll = (e.key === 'ArrowRight' ? 1 : -1) * CELL * 5;
    canvasArea.scrollLeft += scroll;
  }
});

</script>
</body>
