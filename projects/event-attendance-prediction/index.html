<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prediction of attendance in Facebook events</title>
  <style>
    :root{--bg:#f6f7f9;--card:#fff;--ink:#1b2230;--muted:#647089;--line:#e4e8ef;--accent:#2f6df6;--wip:#c98a1a}
    @media (prefers-color-scheme:dark){:root{--bg:#0f131a;--card:#161c26;--ink:#eef1f6;--muted:#9aa6bd;--line:#232c3a;--accent:#5b8bff;--wip:#e0a53a}}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--ink);
      font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
    main{max-width:540px;padding:40px 26px;text-align:center}
    a.back{display:inline-block;margin-bottom:22px;color:var(--muted);text-decoration:none;font-size:14px;font-weight:600}
    a.back:hover{color:var(--accent)}
    .tag{display:inline-block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
      color:var(--wip);border:1px solid var(--wip);padding:4px 10px;border-radius:999px;margin-bottom:16px}
    h1{font-size:clamp(22px,4.5vw,30px);letter-spacing:-.02em;margin:0 0 10px}
    p{color:var(--muted);margin:0 0 8px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:34px 28px;margin-top:18px}
  </style>
</head>
<body>
  <main>
    <a class="back" href="../../">← Projects</a>
    <div class="card">
      <span class="tag">● In progress</span>
      <h1>Prediction of attendance in events organized through Facebook</h1>
      <p>Predict how many people will actually attend Facebook events, from event features and RSVP signals.</p>
      <p>Notebooks and models coming soon.</p>
    </div>
  </main>
</body>
</html>
