var q=document.getElementById('q'),ft=document.getElementById('ft'),fc=document.getElementById('fc'),fl=document.getElementById('fl'),tb=document.getElementById('tb'),count=document.getElementById('count');
function uniq(k){return Array.from(new Set(DATA.map(function(r){return r[k]}))).sort();}
uniq('t').forEach(function(v){ft.innerHTML+='<option>'+v+'</option>'});
uniq('cat').forEach(function(v){fc.innerHTML+='<option>'+v+'</option>'});
var sortK='id',sortDir=1;
function norm(s){s=String(s||'').toLowerCase();return s.normalize?s.normalize('NFD').replace(/[\u0300-\u036f]/g,''):s;}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function render(){
  var t=norm(q.value.trim()),tv=ft.value,cv=fc.value,lv=fl.value;
  var rows=DATA.filter(function(r){
    if(tv&&r.t!==tv)return false; if(cv&&r.cat!==cv)return false;
    if(lv==='1'&&!r.coord)return false; if(lv==='0'&&r.coord)return false;
    if(t&&norm(r.id+' '+r.n).indexOf(t)<0)return false; return true;});
  rows.sort(function(a,b){var x=a[sortK],y=b[sortK];if(x<y)return -sortDir;if(x>y)return sortDir;return 0;});
  tb.innerHTML=rows.map(function(r){return '<tr><td>'+r.id+'</td><td class="n">'+esc(r.n)+'</td>'+
    '<td class="t-'+r.t.replace(/\s/g,'')+'">'+r.t+'</td><td>'+esc(r.st)+'</td><td>'+esc(r.cat)+'</td>'+
    '<td>'+esc(r.b)+'</td><td>'+esc(r.c)+'</td><td class="'+(r.coord?'yes':'no')+'">'+(r.coord?'✔':'—')+'</td><td>'+esc(r.ano)+'</td></tr>';}).join('');
  count.textContent=rows.length+' / '+DATA.length+' nós';
}
[q,ft,fc,fl].forEach(function(e){e.addEventListener('input',render)});
document.querySelectorAll('th').forEach(function(th){th.addEventListener('click',function(){var k=th.dataset.k;if(sortK===k)sortDir*=-1;else{sortK=k;sortDir=1;}render();});});
render();
